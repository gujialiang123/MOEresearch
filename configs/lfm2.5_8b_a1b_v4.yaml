# LFM2.5-8B-A1B server config for v4 decode-stress sweep

model-path: "/data/hf/LFM2.5-8B-A1B"
served-model-name: "lfm2.5-8b-a1b"

host: "127.0.0.1"
port: 30000
_gpu_id: 6

tensor-parallel-size: 1

# Short context — decode-focused regimes don't need long context
mem-fraction-static: 0.85
context-length: 8192
max-prefill-tokens: 16384

schedule-policy: "lpm"
schedule-conservativeness: 1.0
max-running-requests: 32
chunked-prefill-size: -1
disable-radix-cache: false
disable-cuda-graph: false

log-requests: false
trust-remote-code: true
