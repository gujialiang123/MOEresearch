# Qwen3-30B-A3B-Instruct-2507 FP8 (blockwise-quantized) model constants
# Source: /data/hf/models/Qwen3-30B-A3B-Instruct-2507-FP8/config.json
#
# Same architecture as bf16 version but weights stored in FP8 (e4m3, 128×128 blocks).
# Only difference for MFU/MBU:
#   - dtype_bytes: 1 (fp8) instead of 2 (bf16)
#   - peak FLOPs: uses H200 fp8 TC = 1979 TFLOPS (2× bf16)
#   - HBM bytes/token halved → decode step should be ~2× faster in theory

name: Qwen3-30B-A3B-Instruct-2507-FP8
family: qwen3_moe
architectures: [Qwen3MoeForCausalLM]

hidden_size: 2048
num_attention_layers: 48
num_conv_layers: 0
num_dense_ffn_layers: 0
num_moe_ffn_layers: 48
num_experts: 128
num_experts_per_tok: 8
intermediate_size_dense: 0
intermediate_size_moe: 768
num_heads: 32
num_kv_heads: 4
head_dim: 128
vocab_size: 151936
tie_word_embeddings: false
max_position_embeddings: 262144
dtype: fp8
dtype_bytes: 1

active_params_per_token: 4.7e9
total_params: 30.5e9

decode_flops_per_token: 9.4e9
decode_hbm_bytes_per_token: 4.7e9   # half of bf16 due to fp8 weights
