# Qwen3-0.6B (small dense) model constants
# Source: /data/hf/models/Qwen3-0.6B/config.json
#
# Small dense model for sanity comparison — how does MFU behave when the
# active parameter count is tiny (0.6B vs LFM's 1.6B vs Qwen3-30B's 4.7B)?

name: Qwen3-0.6B
family: qwen3
architectures: [Qwen3ForCausalLM]

hidden_size: 1024
num_attention_layers: 28
num_conv_layers: 0
num_dense_ffn_layers: 28
num_moe_ffn_layers: 0
num_experts: 0
num_experts_per_tok: 0
intermediate_size_dense: 3072
intermediate_size_moe: 0
num_heads: 16
num_kv_heads: 8
head_dim: 64
vocab_size: 151936
tie_word_embeddings: false
max_position_embeddings: 40960
dtype: bfloat16
dtype_bytes: 2

# All params are active (dense model). ~0.6B per token.
active_params_per_token: 0.6e9
total_params: 0.6e9

decode_flops_per_token: 1.2e9
decode_hbm_bytes_per_token: 1.2e9
