# Qwen3-30B-A3B model constants for MFU/MBU computation.
# For retro-computing MFU on 6/25 experiment results.
#
# Source: Qwen3-30B-A3B model card (HuggingFace)
# https://huggingface.co/Qwen/Qwen3-30B-A3B/blob/main/config.json
#
# Architecture summary:
#   - 48 layers (all standard transformer + MoE)
#   - MoE: 128 experts, top-8 active per token
#   - hidden=2048, moe_ffn=768
#   - num_heads=32, num_kv_heads=4 (GQA), head_dim=128
#   - vocab=151936, tie_word_embeddings=false

name: Qwen3-30B-A3B
family: qwen3_moe
architectures: [Qwen3MoeForCausalLM]

hidden_size: 2048
num_attention_layers: 48
num_conv_layers: 0
num_dense_ffn_layers: 0
num_moe_ffn_layers: 48
num_experts: 128
num_experts_per_tok: 8
intermediate_size_dense: 0
intermediate_size_moe: 768
num_heads: 32
num_kv_heads: 4
head_dim: 128
vocab_size: 151936
tie_word_embeddings: false
max_position_embeddings: 32768
dtype: bfloat16
dtype_bytes: 2

# Per-token active params: ~3B (matches "A3B" marketing)
active_params_per_token: 3.0e9
total_params: 30.5e9

decode_flops_per_token: 6.0e9
decode_hbm_bytes_per_token: 6.0e9
