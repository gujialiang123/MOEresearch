# Base config for LFM2.5-8B-A1B (MoE, 32 experts, top-4, ~1B active of 8B total)
# Following sglang cookbook's H200 single-GPU recipe (LiquidAI/LFM2.5-8B-A1B).

model-path: "/data/hf/LFM2.5-8B-A1B"
served-model-name: "lfm2.5-8b-a1b"

host: "127.0.0.1"
port: 30000

_gpu_id: 4

tensor-parallel-size: 1

# Conservative defaults from cookbook
mem-fraction-static: 0.85
context-length: 32768

# Same scheduler defaults as Qwen3-30B-A3B (for cross-model comparison)
schedule-policy: "lpm"
schedule-conservativeness: 1.0
max-running-requests: 32
chunked-prefill-size: -1
max-prefill-tokens: 16384
disable-radix-cache: false
disable-cuda-graph: false

log-requests: false
trust-remote-code: true
