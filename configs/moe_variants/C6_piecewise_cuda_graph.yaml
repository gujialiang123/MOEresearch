# MoE config — C6: piecewise CUDA graph
# Hypothesis: smaller-granularity CUDA graphs that cover layer slices
# rather than whole decode steps. cudaGraphLaunch should still show up
# but with different shapes.

model-path: "/data/hf/models/Qwen3-30B-A3B-Instruct-2507"
served-model-name: "qwen3-30b-a3b-moe"

host: "127.0.0.1"
port: 30000

_gpu_id: 0

tensor-parallel-size: 1
mem-fraction-static: 0.85
context-length: 32768

schedule-policy: "lpm"
schedule-conservativeness: 1.0
max-running-requests: 32
chunked-prefill-size: -1
max-prefill-tokens: 16384
disable-radix-cache: false
disable-cuda-graph: false

# ★ knob under test
enable-piecewise-cuda-graph: true
piecewise-cuda-graph-tokens: [512, 1024, 2048, 4096, 8192]

log-requests: false
trust-remote-code: true
