# MoE config — C4: MoE runner backend = cutlass
# Hypothesis: fused_moe_kernel (Triton) gets REPLACED by cutlass MoE
# kernels. Kernel names + percentages in the trace should change.

model-path: "/data/hf/models/Qwen3-30B-A3B-Instruct-2507"
served-model-name: "qwen3-30b-a3b-moe"

host: "127.0.0.1"
port: 30000

_gpu_id: 0

tensor-parallel-size: 1
mem-fraction-static: 0.85
context-length: 32768

schedule-policy: "lpm"
schedule-conservativeness: 1.0
max-running-requests: 32
chunked-prefill-size: -1
max-prefill-tokens: 16384
disable-radix-cache: false
disable-cuda-graph: false

# ★ knob under test — was "auto" (→ triton)
moe-runner-backend: cutlass

log-requests: false
trust-remote-code: true
