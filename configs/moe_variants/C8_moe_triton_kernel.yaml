# MoE config — C8: triton_kernels MoE runner
# Per §25.2 — this branch ALSO actually swaps the kernel. Uses
# triton_kernels library's matmul_ogs (OpenAI/triton subproject).
# Different code path from sglang's own fused_moe_kernel.

model-path: "/data/hf/models/Qwen3-30B-A3B-Instruct-2507"
served-model-name: "qwen3-30b-a3b-moe"

host: "127.0.0.1"
port: 30000

_gpu_id: 0

tensor-parallel-size: 1
mem-fraction-static: 0.85
context-length: 32768

schedule-policy: "lpm"
schedule-conservativeness: 1.0
max-running-requests: 32
chunked-prefill-size: -1
max-prefill-tokens: 16384
disable-radix-cache: false
disable-cuda-graph: false

# ★ knob under test — REAL kernel swap to matmul_ogs
moe-runner-backend: triton_kernel

log-requests: false
trust-remote-code: true
