# MoE config — C7: flashinfer_cutlass MoE runner
# Per §25.1 — this branch ACTUALLY swaps the kernel (NOT silent no-op).
# Calls flashinfer_cutlass_fused_moe + permutes weights at load time.
# This is one of the 4 honoured values on bf16 MoE.

model-path: "/data/hf/models/Qwen3-30B-A3B-Instruct-2507"
served-model-name: "qwen3-30b-a3b-moe"

host: "127.0.0.1"
port: 30000

_gpu_id: 0

tensor-parallel-size: 1
mem-fraction-static: 0.85
context-length: 32768

schedule-policy: "lpm"
schedule-conservativeness: 1.0
max-running-requests: 32
chunked-prefill-size: -1
max-prefill-tokens: 16384
disable-radix-cache: false
disable-cuda-graph: false

# ★ knob under test — REAL kernel swap (not no-op)
moe-runner-backend: flashinfer_cutlass

log-requests: false
trust-remote-code: true
