submission_id: lfm2.5-v3-true-default-longctx
description: |
  v3 (2026-07-02): true-default baseline on the extended long-context regime
  set. context-length=72k so we can bench up to 65k prompt tokens.

  No cookbook parser flags. Fair "raw sglang default" reference.

tags: [v3, longctx, true-default, lfm2.5-8b-a1b]

server:
  config: configs/lfm2.5_8b_a1b_v3_longctx.yaml
  overrides:
    _gpu_id: 6
    port: 31600
  conda_env: sglang-dev
  health_url: http://127.0.0.1:31600/health
  base_url:   http://127.0.0.1:31600
  startup_timeout_s: 900

regimes:
  file: regimes/lfm2.5_long_context_sweep.yaml

bench:
  num_runs: 3
  reliable_stddev_pct: 8
  per_request_timeout_s: 900
  backend: sglang

quality_gate:
  type: sanity
